[package]
name = "zkredit-shared"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[features]
# Enables the DG6 test: verifies a real Poseidon Groth16 proof against vectors
# generated by ml/zk/identity_circuit/build.sh. Off by default.
dg6 = []
# Enables the RISC Zero Groth16 receipt verifier (contracts/shared/src/risc0.rs).
# Scaffold — off by default until the pinned constants + claim-digest port land.
risc0 = []

[dependencies]
soroban-sdk = { workspace = true }

[dev-dependencies]
soroban-sdk = { workspace = true, features = ["testutils"] }
