[package]
name = "zkredit-risk-attestation"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true

[lib]
crate-type = ["cdylib", "rlib"]

[features]
# Enables the DG6 test which verifies a real Poseidon Groth16 proof against
# vectors generated by ml/zk/identity_circuit/build.sh. Off by default so the
# workspace compiles before those vectors exist.
dg6 = []

[dependencies]
soroban-sdk = { workspace = true }
zkredit-shared = { path = "../shared" }

[dev-dependencies]
soroban-sdk = { workspace = true, features = ["testutils"] }
