name: ZKredit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Soroban contract unit tests. rustup auto-honors rust-toolchain.toml
  # (1.94.1 + wasm target) on the runner.
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
      - name: Run contract tests
        run: make test-contracts

  # Backend: lint + migrations against real Postgres + the pytest suite.
  # Real RISC0/Bento/Boundless proving is never run in CI (the prover toolchain
  # is absent; the code paths fall back per Risc0ProverUnavailableError).
  python-tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: zkredit
          POSTGRES_PASSWORD: zkredit
          POSTGRES_DB: zkredit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U zkredit"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://zkredit:zkredit@localhost:5432/zkredit
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install .
          pip install pytest "pytest-asyncio>=0.24,<0.25" aiosqlite respx fakeredis onnxruntime ruff
      - name: Ruff (lint)
        run: ruff check .
      - name: Alembic upgrade (real Postgres)
        run: alembic upgrade head
      - name: Pytest
        run: pytest api/tests ml/tests

  # Frontend: typecheck + Vitest unit tests + production build.
  frontend-ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests (Vitest)
        run: npm test
      - name: Build
        run: npm run build
