name: ZKredit CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # Real job: runs the Soroban contract unit tests. rustup auto-honors
  # rust-toolchain.toml (1.94.1 + wasm target) on the runner.
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
      - name: Run contract tests
        run: make test-contracts

