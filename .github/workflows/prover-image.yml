name: prover-image

# Builds the RunPod serverless RISC Zero worker and pushes it to GHCR.
#
# Why CI and not a laptop: the image is linux/amd64 CUDA. Building it on an
# arm64 Mac goes through QEMU and takes hours. A hosted x86 runner does it
# natively.
#
# Why an immutable tag: RunPod caches images per worker node, and re-pushing a
# mutable tag like `:latest` does not reliably force a re-pull -- an endpoint
# can keep serving an old digest, which makes "the fix didn't work" and "the fix
# never shipped" look identical. Always repoint the endpoint at the :sha- tag.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "ml/risc0/**"
      - ".github/workflows/prover-image.yml"

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      # The CUDA devel base (~7GB) + Rust + the RISC Zero toolchain + a cargo
      # target dir for the whole cuda dep graph will not fit in a stock runner's
      # free space. Reclaim the preinstalled toolchains we don't use.
      - name: Free disk space
        run: |
          df -h /
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost \
                      /usr/local/.ghcup
          sudo docker image prune -af || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # GHCR namespaces must be lowercase, but `github.repository_owner` keeps the
      # account's original casing (e.g. `PoulavBhowmick03`). Pushing that verbatim
      # fails at the very end of a ~1h build. Downcase it here so the workflow
      # works unchanged in a fork.
      - name: Image ref
        id: meta
        run: |
          echo "image=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')/zkredit-prover" >> "$GITHUB_OUTPUT"
          echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # Build context is the repo root: the Dockerfile copies ml/risc0 (which
      # includes vendor/risc0-sys, the patched kernels).
      #
      # The build self-asserts and FAILS if either invariant is violated:
      #   1. the vendored risc0-sys eltwise_zeroize bounds fix compiled in
      #   2. sppark == 0.1.12 and blst == 0.3.15 (risc0 v3.0.5's own pins)
      # so a broken image can never reach a GPU.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ml/risc0/worker/Dockerfile
          platforms: linux/amd64
          push: true
          build-args: |
            BUILD_ID=${{ steps.meta.outputs.short }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short }}
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}:latest
          # Links the GHCR package to this repo, so package settings are reachable
          # from the repo and visibility can be managed by its owner.
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          provenance: false

      - name: Image to deploy
        run: |
          echo "Point the RunPod endpoint at this exact tag:"
          echo "  ${{ env.REGISTRY }}/${{ steps.meta.outputs.image }}:sha-${{ steps.meta.outputs.short }}"
